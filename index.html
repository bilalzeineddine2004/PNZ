<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pino's Ops">
<meta name="theme-color" content="#1a1a1a">
<title>Pino's Operations</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf8f5;--bg-card:#fff;--bg-hover:#f5f2ee;--text:#1a1a1a;--text-secondary:#6b6560;--text-muted:#9e9893;--border:#e8e4df;--accent:#c4501a;--accent-light:#fff3ed;--green:#2d8a4e;--green-bg:#edf7f0;--yellow:#c49000;--yellow-bg:#fef9eb;--red:#c4301a;--red-bg:#fdf0ed;--gray:#8a8a8a;--gray-bg:#f0f0f0;--shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);--shadow-lg:0 4px 12px rgba(0,0,0,.08);--radius:12px;--radius-sm:8px;--font:'DM Sans',-apple-system,sans-serif;--font-display:'DM Serif Display',Georgia,serif;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
[data-theme="dark"]{--bg:#111110;--bg-card:#1c1c1a;--bg-hover:#252523;--text:#ede9e3;--text-secondary:#a09a93;--text-muted:#6b6560;--border:#2e2d2a;--accent:#e8733d;--accent-light:#2a1a10;--green-bg:#0f1f14;--yellow-bg:#1f1a0a;--red-bg:#1f0f0a;--gray-bg:#222;--shadow:0 1px 3px rgba(0,0,0,.2);--shadow-lg:0 4px 12px rgba(0,0,0,.3)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;padding-top:var(--safe-top);padding-bottom:calc(72px + var(--safe-bottom))}
button{font-family:var(--font);cursor:pointer;border:none;background:none;color:var(--text)}
input,select,textarea{font-family:var(--font);color:var(--text)}
.topbar{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.topbar-logo{height:42px}
.topbar-actions{display:flex;gap:8px}
.topbar-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);background:var(--bg-card);border:1px solid var(--border);font-size:18px}
.topbar-btn:active{background:var(--bg-hover)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg-card);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 2px 6px;font-size:9.5px;font-weight:500;color:var(--text-muted);gap:2px}
.nav-item.active{color:var(--accent)}
.nav-item svg{width:21px;height:21px}
.nav-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);opacity:0}
.nav-item.active .nav-dot{opacity:1}
.page{display:none;padding:16px 20px 24px;animation:fadeIn .2s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px}
.card-title{font-weight:600;font-size:15px}
.greeting{font-family:var(--font-display);font-size:26px;margin-bottom:4px}
.greeting-sub{color:var(--text-secondary);font-size:14px;margin-bottom:20px}
.quick-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
.stat-card.alert{border-left:3px solid var(--red)}.stat-card.warn{border-left:3px solid var(--yellow)}.stat-card.good{border-left:3px solid var(--green)}.stat-card.info{border-left:3px solid var(--accent)}
.stat-num{font-size:28px;font-weight:700;line-height:1}
.stat-label{font-size:12px;color:var(--text-secondary);margin-top:4px}
.dash-section-title{font-weight:600;font-size:15px;margin:20px 0 10px}
.alert-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;font-size:14px}
.alert-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.alert-dot.red{background:var(--red)}.alert-dot.yellow{background:var(--yellow)}.alert-dot.green{background:var(--green)}.alert-dot.gray{background:var(--gray)}.alert-dot.orange{background:#e87a1a}
.alert-name{flex:1;font-weight:500}.alert-detail{font-size:12px;color:var(--text-secondary)}
.search-bar{display:flex;gap:8px;margin-bottom:14px}
.search-input{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:15px;background:var(--bg-card);outline:none}
.search-input:focus{border-color:var(--accent)}
.filter-btn{padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-weight:500;background:var(--bg-card);white-space:nowrap}
.cat-pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;margin-bottom:10px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.cat-pills::-webkit-scrollbar{display:none}
.cat-pill{padding:7px 14px;border-radius:20px;font-size:13px;font-weight:500;white-space:nowrap;background:var(--bg-card);border:1px solid var(--border)}
.cat-pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.loc-header{font-weight:700;font-size:15px;padding:14px 0 6px;color:var(--accent);display:flex;align-items:center;gap:6px}
.loc-header svg{width:16px;height:16px}
.subgroup-title{font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);padding:8px 0 4px 12px}
.inv-item{display:flex;align-items:center;padding:12px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:5px;box-shadow:var(--shadow);cursor:pointer}
.inv-item:active{background:var(--bg-hover)}
.inv-status{width:10px;height:10px;border-radius:50%;margin-right:12px;flex-shrink:0}
.inv-status.green{background:var(--green)}.inv-status.yellow{background:var(--yellow)}.inv-status.red{background:var(--red)}.inv-status.gray{background:var(--gray)}
.inv-info{flex:1;min-width:0}
.inv-name{font-weight:500;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inv-meta{font-size:12px;color:var(--text-secondary);margin-top:2px}
.inv-qty{text-align:right}
.inv-qty-num{font-weight:700;font-size:16px}
.inv-qty-unit{font-size:11px;color:var(--text-secondary)}
.inv-badges{display:flex;gap:4px;margin-top:3px;justify-content:flex-end}
.inv-badge{font-size:9px;padding:2px 5px;border-radius:4px;font-weight:600}
.inv-badge.exp{background:var(--red-bg);color:var(--red)}
.inv-badge.notify{background:var(--yellow-bg);color:var(--yellow)}
.shift-tabs{display:flex;gap:6px;margin-bottom:14px}
.shift-tab{flex:1;padding:10px;text-align:center;border-radius:var(--radius-sm);font-size:13px;font-weight:600;background:var(--bg-card);border:1px solid var(--border)}
.shift-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.progress-bar-wrap{background:var(--bg-hover);border-radius:6px;height:8px;margin-bottom:14px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:6px;background:var(--green);transition:width .4s ease}
.progress-label{font-size:13px;color:var(--text-secondary);margin-bottom:6px;display:flex;justify-content:space-between}
.task-group-title{font-weight:600;font-size:13px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px;padding-left:2px}
.task-item{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:5px;box-shadow:var(--shadow);transition:opacity .2s}
.task-item.done{opacity:.55}
.task-check{width:28px;height:28px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;cursor:pointer;font-size:15px}
.task-item.done .task-check{background:var(--green);border-color:var(--green);color:#fff}
.task-content{flex:1;min-width:0}
.task-name{font-weight:500;font-size:14px;line-height:1.35}
.task-item.done .task-name{text-decoration:line-through}
.task-detail{font-size:12px;color:var(--text-secondary);margin-top:2px}
.task-item.overdue{border-left:3px solid var(--red)}
.initials-prompt{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:250;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);animation:fadeIn .15s ease}
.initials-box{background:var(--bg);border-radius:var(--radius);padding:20px;width:280px;box-shadow:var(--shadow-lg)}
.initials-box h3{font-size:16px;font-weight:600;margin-bottom:12px}
.initials-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.initials-btn{padding:12px;border-radius:var(--radius-sm);background:var(--bg-card);border:1px solid var(--border);font-size:15px;font-weight:600;text-align:center}
.initials-btn:active{background:var(--accent);color:#fff;border-color:var(--accent)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal-sheet{background:var(--bg);border-radius:16px 16px 0 0;width:100%;max-width:600px;max-height:85dvh;overflow-y:auto;padding:20px 20px calc(20px + var(--safe-bottom));animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal-title{font-weight:700;font-size:18px;margin-bottom:16px}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:13px;font-weight:500;margin-bottom:5px;color:var(--text-secondary)}
.form-input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:15px;background:var(--bg-card);outline:none}
.form-input:focus{border-color:var(--accent)}
.form-row{display:flex;gap:10px}.form-row>*{flex:1}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 20px;border-radius:var(--radius-sm);font-size:15px;font-weight:600;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff;width:100%}.btn-primary:active{opacity:.85}
.btn-secondary{background:var(--bg-hover);border:1px solid var(--border)}
.btn-danger{background:var(--red);color:#fff}
.btn-sm{padding:8px 14px;font-size:13px}
.analytics-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.analytics-card h3{font-size:14px;font-weight:600;margin-bottom:10px}
.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{width:80px;font-size:12px;color:var(--text-secondary);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:22px;background:var(--bg-hover);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:var(--accent);display:flex;align-items:center;padding-left:6px;font-size:11px;font-weight:600;color:#fff;min-width:28px;transition:width .5s ease}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border)}
.setting-info{flex:1}.setting-name{font-weight:500;font-size:14px}.setting-desc{font-size:12px;color:var(--text-secondary);margin-top:2px}
.toggle{width:48px;height:28px;border-radius:14px;background:var(--border);position:relative;transition:background .2s;cursor:pointer;flex-shrink:0}
.toggle.on{background:var(--green)}
.toggle::after{content:'';width:22px;height:22px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.toggle.on::after{transform:translateX(20px)}
.staff-chip{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:14px;font-size:13px;font-weight:500;background:var(--bg-hover);border:1px solid var(--border);margin:3px}
.staff-chip .remove{font-size:16px;color:var(--text-muted);cursor:pointer}
.fab{position:fixed;bottom:calc(82px + var(--safe-bottom));right:20px;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:var(--shadow-lg);z-index:90}
.fab:active{transform:scale(.92)}
.notify-item{padding:12px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px}
.notify-item .n-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.notify-item .n-info{flex:1}
.notify-item .n-name{font-weight:500;font-size:14px}
.notify-item .n-detail{font-size:12px;color:var(--text-secondary);margin-top:2px}
.notify-section-title{font-weight:600;font-size:13px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px}
.badge-count{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;position:absolute;top:4px;right:8px}
.nav-item{position:relative}
.waste-entry{padding:10px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:5px;font-size:13px}
.waste-entry .waste-item{font-weight:500}.waste-entry .waste-meta{color:var(--text-secondary);font-size:12px;margin-top:2px}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-muted)}.empty-state p{font-size:14px}
.toast{position:fixed;bottom:calc(82px + var(--safe-bottom));left:50%;transform:translateX(-50%);padding:10px 20px;background:var(--text);color:var(--bg);border-radius:20px;font-size:13px;font-weight:500;z-index:300;animation:toastIn .25s ease,toastOut .25s ease 2s forwards;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}}
@keyframes toastOut{to{opacity:0;transform:translateX(-50%) translateY(-10px)}}
@media(min-width:768px){.quick-stats{grid-template-columns:repeat(4,1fr)}.page{padding:20px 32px 32px}body{max-width:900px;margin:0 auto}}
</style>
</head>
<body>
<div class="topbar">
  <img class="topbar-logo" id="app-logo" alt="Pino's">
  <div class="topbar-actions">
    <button class="topbar-btn" onclick="exportData()">📥</button>
    <button class="topbar-btn" onclick="toggleTheme()">🌙</button>
  </div>
</div>

<div class="page active" id="page-dash">
  <div class="greeting" id="greeting"></div>
  <div class="greeting-sub" id="greeting-date"></div>
  <div class="quick-stats" id="quick-stats"></div>
  <div class="dash-section-title">⚠️ Needs Attention</div>
  <div id="dash-alerts"></div>
  <div class="dash-section-title">📋 Today's Progress</div>
  <div id="dash-progress"></div>
</div>

<div class="page" id="page-inv">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
    <h2 style="font-family:var(--font-display);font-size:22px;">Inventory</h2>
    <button class="btn btn-sm btn-secondary" onclick="openWasteLog()">🗑 Waste</button>
  </div>
  <div class="search-bar">
    <input class="search-input" id="inv-search" placeholder="Search items..." oninput="renderInventory()">
  </div>
  <div class="cat-pills" id="cat-pills"></div>
  <div id="inv-list"></div>
</div>

<div class="page" id="page-check">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
    <h2 style="font-family:var(--font-display);font-size:22px;">Checklists</h2>
    <button class="btn btn-sm btn-secondary" onclick="resetTodayChecklist()">↻ Reset</button>
  </div>
  <div class="shift-tabs" id="shift-tabs"></div>
  <div class="progress-label"><span id="progress-text"></span><span id="progress-pct"></span></div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill"></div></div>
  <div id="check-list"></div>
</div>

<div class="page" id="page-notify">
  <h2 style="font-family:var(--font-display);font-size:22px;margin-bottom:14px;">🔔 Notifications</h2>
  <div id="notify-content"></div>
</div>

<div class="page" id="page-analytics">
  <h2 style="font-family:var(--font-display);font-size:22px;margin-bottom:14px;">Analytics</h2>
  <div id="analytics-content"></div>
</div>

<div class="page" id="page-settings">
  <h2 style="font-family:var(--font-display);font-size:22px;margin-bottom:14px;">Settings</h2>
  <div class="card"><div class="card-title" style="margin-bottom:10px;">Staff Members</div><div id="staff-list"></div>
    <div style="display:flex;gap:8px;margin-top:10px;">
      <input class="form-input" id="new-staff-name" placeholder="Name" style="flex:2;">
      <input class="form-input" id="new-staff-init" placeholder="Initials" maxlength="3" style="flex:1;">
      <button class="btn btn-primary btn-sm" style="width:auto;padding:8px 16px;" onclick="addStaff()">Add</button>
    </div>
  </div>
  <div class="card"><div class="card-title" style="margin-bottom:10px;">Preferences</div>
    <div class="setting-row"><div class="setting-info"><div class="setting-name">Dark Mode</div></div><div class="toggle" id="dark-toggle" onclick="toggleTheme()"></div></div>
    <div class="setting-row"><div class="setting-info"><div class="setting-name">Manager Mode</div></div><div class="toggle" id="manager-toggle" onclick="toggleManager()"></div></div>
  </div>
  <div class="card"><div class="card-title" style="margin-bottom:10px;">Data</div>
    <button class="btn btn-secondary btn-sm" onclick="exportData()" style="width:100%;margin-bottom:8px;">📥 Export JSON</button>
    <button class="btn btn-secondary btn-sm" onclick="exportCSV()" style="width:100%;margin-bottom:8px;">📊 Export CSV</button>
    <button class="btn btn-danger btn-sm" onclick="clearAllData()" style="width:100%;">⚠️ Clear All Data</button>
  </div>
</div>

<button class="fab" id="fab" onclick="handleFab()">+</button>

<div class="bottom-nav">
  <button class="nav-item active" onclick="goTo('dash')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Home</span><div class="nav-dot"></div></button>
  <button class="nav-item" onclick="goTo('inv')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg><span>Inventory</span><div class="nav-dot"></div></button>
  <button class="nav-item" onclick="goTo('check')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg><span>Checklists</span><div class="nav-dot"></div></button>

function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,DB_VERSION);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('state'))d.createObjectStore('state');};r.onsuccess=e=>{db=e.target.result;res(db);};r.onerror=e=>rej(e);})}
function saveToDB(){if(!db)return;const tx=db.transaction('state','readwrite');tx.objectStore('state').put(JSON.parse(JSON.stringify(state)),'appState');}
function loadFromDB(){return new Promise(res=>{if(!db){res();return;}const tx=db.transaction('state','readonly');const r=tx.objectStore('state').get('appState');r.onsuccess=()=>{if(r.result){Object.assign(state,r.result);const ids=new Set(state.inventory.map(i=>i.id));DEFAULT_INVENTORY.forEach(d=>{if(!ids.has(d.id))state.inventory.push({...d});});state.inventory.forEach(i=>{if(i.notifyOut===undefined)i.notifyOut=true;if(i.notifyLow===undefined)i.notifyLow=false;if(!i.loc)i.loc='walk-in';if(!i.sub)i.sub='Other';});}res();};r.onerror=()=>res();})}

function goTo(p){state.currentPage=p;document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));document.getElementById('page-'+p).classList.add('active');document.querySelectorAll('.nav-item').forEach((n,i)=>n.classList.toggle('active',PAGES[i]===p));document.getElementById('fab').style.display=(p==='inv')?'flex':'none';renderPage(p);saveToDB();}
function renderPage(p){switch(p){case'dash':renderDashboard();break;case'inv':renderInventory();break;case'check':renderChecklist();break;case'notify':renderNotify();break;case'analytics':renderAnalytics();break;case'settings':renderSettings();break;}updateBadge();}
function handleFab(){if(state.currentPage==='inv')openAddItem();}

function today(){return new Date().toISOString().split('T')[0];}
function now(){return new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}
function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2500);}
function getStatus(i){if(i.qty<=0)return'gray';const r=i.qty/i.par;if(r<=0.25)return'red';if(r<=0.5)return'yellow';return'green';}
function getGreeting(){const h=new Date().getHours();return h<12?'Good morning':h<17?'Good afternoon':'Good evening';}
function getAllTasks(s){return(CHECKLISTS[s]?.groups||[]).flatMap(g=>g.tasks);}
function getLocLabel(id){return LOCATIONS.find(l=>l.id===id)?.label||id;}
function getLocIcon(id){return LOCATIONS.find(l=>l.id===id)?.icon||'📍';}

function getNotifications(){
  const n=[];
  state.inventory.forEach(i=>{
    if(i.notifyOut&&i.qty<=0)n.push({type:'out',item:i,msg:'Out of stock'});
    else if(i.notifyLow&&i.qty>0&&i.qty/i.par<=0.25)n.push({type:'critical',item:i,msg:`Critical — ${i.qty} ${i.unit} left`});
    else if(i.notifyLow&&i.qty>0&&i.qty/i.par<=0.5)n.push({type:'low',item:i,msg:`Running low — ${i.qty} ${i.unit}`});
    if(i.expDate){const exp=new Date(i.expDate);const days=Math.ceil((exp-new Date())/(1000*60*60*24));if(days<=0)n.push({type:'expired',item:i,msg:'Expired'});else if(days<=3)n.push({type:'expiring',item:i,msg:`Expires in ${days} day${days>1?'s':''}`});}
    if(i.shelfLife&&i.shelfLifeStart){const start=new Date(i.shelfLifeStart);const end=new Date(start.getTime()+i.shelfLife*24*60*60*1000);const days=Math.ceil((end-new Date())/(1000*60*60*24));if(days<=0)n.push({type:'expired',item:i,msg:'Past shelf life'});else if(days<=3)n.push({type:'expiring',item:i,msg:`${days}d shelf life left`});}
  });
  return n;
}
function updateBadge(){const n=getNotifications().length;const b=document.getElementById('notify-badge');if(n>0){b.textContent=n;b.style.display='inline';}else{b.style.display='none';}}

// ─── DASHBOARD ───
function renderDashboard(){
  document.getElementById('greeting').textContent=getGreeting();
  document.getElementById('greeting-date').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const inv=state.inventory,oos=inv.filter(i=>i.qty<=0).length,crit=inv.filter(i=>getStatus(i)==='red'&&i.qty>0).length,warn=inv.filter(i=>getStatus(i)==='yellow').length;
  const tl=state.checklistLog[today()]||{};const mT=getAllTasks('morning'),cT=getAllTasks('closing');
  const mD=mT.filter(t=>tl[t.id]?.done).length,cD=cT.filter(t=>tl[t.id]?.done).length;
  const mP=mT.length?Math.round(mD/mT.length*100):0,cP=cT.length?Math.round(cD/cT.length*100):0;
  const notifs=getNotifications().length;
  document.getElementById('quick-stats').innerHTML=`
    <div class="stat-card ${oos>0?'alert':'good'}"><div class="stat-num">${oos}</div><div class="stat-label">Out of Stock</div></div>
    <div class="stat-card ${crit>0?'alert':'good'}"><div class="stat-num">${crit}</div><div class="stat-label">Critical</div></div>
    <div class="stat-card ${warn>0?'warn':'good'}"><div class="stat-num">${warn}</div><div class="stat-label">Low</div></div>
    <div class="stat-card ${notifs>0?'alert':'info'}"><div class="stat-num">${notifs}</div><div class="stat-label">Alerts</div></div>`;
  document.getElementById('dash-alerts').innerHTML=notifs===0?'<div class="alert-item"><span style="color:var(--green)">✓</span> Everything looks good</div>':getNotifications().slice(0,6).map(n=>`<div class="alert-item"><div class="alert-dot ${n.type==='out'?'gray':n.type==='critical'?'red':n.type==='low'?'yellow':'orange'}"></div><span class="alert-name">${n.item.name}</span><span class="alert-detail">${n.msg}</span></div>`).join('');
  document.getElementById('dash-progress').innerHTML=`
    <div class="card" style="cursor:pointer" onclick="goTo('check');setShift('morning')"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-weight:600;font-size:14px">☀️ Morning Prep</span><span style="font-weight:700;color:var(--accent)">${mD}/${mT.length}</span></div><div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${mP}%"></div></div></div>
    <div class="card" style="cursor:pointer" onclick="goTo('check');setShift('closing')"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-weight:600;font-size:14px">🌙 Closing</span><span style="font-weight:700;color:var(--accent)">${cD}/${cT.length}</span></div><div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${cP}%"></div></div></div>`;
}

// ─── INVENTORY ───
function renderInventory(){
  document.getElementById('cat-pills').innerHTML=`<button class="cat-pill ${state.invLocation==='all'?'active':''}" onclick="setLoc('all')">All</button>`+LOCATIONS.map(l=>`<button class="cat-pill ${state.invLocation===l.id?'active':''}" onclick="setLoc('${l.id}')">${l.icon} ${l.label.replace('Storage Freezer ','Stor. ')}</button>`).join('');
  const q=(document.getElementById('inv-search')?.value||'').toLowerCase();
  let items=state.inventory.filter(i=>(state.invLocation==='all'||i.loc===state.invLocation)&&i.name.toLowerCase().includes(q));
  const list=document.getElementById('inv-list');
  if(!items.length){list.innerHTML='<div class="empty-state"><p>No items found</p></div>';return;}

  // Group by location then sub
  if(state.invLocation==='all'){
    let html='';
    LOCATIONS.forEach(loc=>{
      const locItems=items.filter(i=>i.loc===loc.id);
      if(!locItems.length)return;
      html+=`<div class="loc-header">${loc.icon} ${loc.label}</div>`;
      const subs=[...new Set(locItems.map(i=>i.sub))];
      subs.forEach(sub=>{
        html+=`<div class="subgroup-title">${sub}</div>`;
        locItems.filter(i=>i.sub===sub).sort((a,b)=>a.name.localeCompare(b.name)).forEach(i=>{html+=invItemHTML(i);});
      });
    });
    list.innerHTML=html;
  } else {
    const subs=[...new Set(items.map(i=>i.sub))];
    let html='';
    subs.forEach(sub=>{
      html+=`<div class="subgroup-title">${sub}</div>`;
      items.filter(i=>i.sub===sub).sort((a,b)=>a.name.localeCompare(b.name)).forEach(i=>{html+=invItemHTML(i);});
    });
    list.innerHTML=html;
  }
}
function invItemHTML(i){
  const st=getStatus(i);
  let badges='';
  if(i.expDate){const d=Math.ceil((new Date(i.expDate)-new Date())/(864e5));if(d<=3)badges+=`<span class="inv-badge exp">${d<=0?'EXP':'${d}d'}</span>`;}
  if(i.notifyOut)badges+=`<span class="inv-badge notify">📢</span>`;
  return`<div class="inv-item" onclick="openItemDetail('${i.id}')"><div class="inv-status ${st}"></div><div class="inv-info"><div class="inv-name">${i.name}</div><div class="inv-meta">${getLocLabel(i.loc)} · ${i.sub}</div></div><div class="inv-qty"><div class="inv-qty-num">${i.qty}</div><div class="inv-qty-unit">${i.unit}</div>${badges?`<div class="inv-badges">${badges}</div>`:''}</div></div>`;
}
function setLoc(l){state.invLocation=l;renderInventory();}

function openItemDetail(id){
  const item=state.inventory.find(i=>i.id===id);if(!item)return;
  const st=getStatus(item);
  const stL=st==='green'?'Healthy':st==='yellow'?'Low':st==='red'?'Critical':'Out';
  const stC=st==='green'?'var(--green)':st==='yellow'?'var(--yellow)':st==='red'?'var(--red)':'var(--gray)';
  document.getElementById('modal-body').innerHTML=`
    <div class="modal-title">${item.name}</div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
      <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${stC}"></span>
      <span style="font-size:13px;font-weight:600;color:${stC}">${stL}</span>
      <span style="font-size:12px;color:var(--text-secondary);margin-left:auto">${getLocIcon(item.loc)} ${getLocLabel(item.loc)}</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
      <div class="card" style="margin:0;text-align:center"><div style="font-size:24px;font-weight:700">${item.qty}</div><div style="font-size:11px;color:var(--text-secondary)">${item.unit} in stock</div></div>
      <div class="card" style="margin:0;text-align:center"><div style="font-size:24px;font-weight:700">${item.par}</div><div style="font-size:11px;color:var(--text-secondary)">par level</div></div>
    </div>
    <div class="form-group"><label class="form-label">Quantity</label>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary btn-sm" onclick="adjQ(-5)" style="font-size:18px;width:48px">-5</button>
        <button class="btn btn-secondary btn-sm" onclick="adjQ(-1)" style="font-size:18px;width:48px">-1</button>
        <input class="form-input" id="qty-input" type="number" value="${item.qty}" style="text-align:center;font-size:18px;font-weight:700">
        <button class="btn btn-secondary btn-sm" onclick="adjQ(1)" style="font-size:18px;width:48px">+1</button>
        <button class="btn btn-secondary btn-sm" onclick="adjQ(5)" style="font-size:18px;width:48px">+5</button>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Par Level</label><input class="form-input" id="par-input" type="number" value="${item.par}"></div>
      <div class="form-group"><label class="form-label">Sub-group</label><input class="form-input" id="sub-input" value="${item.sub}"></div>
    </div>
    <div class="form-group"><label class="form-label">Location</label>
      <select class="form-input" id="loc-input">${LOCATIONS.map(l=>`<option value="${l.id}" ${item.loc===l.id?'selected':''}>${l.icon} ${l.label}</option>`).join('')}</select>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Expiry Date</label><input class="form-input" id="exp-input" type="date" value="${item.expDate||''}"></div>
      <div class="form-group"><label class="form-label">Shelf Life (days)</label><input class="form-input" id="shelf-input" type="number" value="${item.shelfLife||''}" placeholder="e.g. 7"></div>
    </div>
    <div class="form-group"><label class="form-label">Adjusted By</label>
      <select class="form-input" id="adj-staff"><option value="">Select...</option>${state.staff.map(s=>`<option value="${s.initials}">${s.name} (${s.initials})</option>`).join('')}</select>
    </div>
    <div style="display:flex;gap:10px;margin:14px 0">
      <label style="flex:1;display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;cursor:pointer">
        <input type="checkbox" id="notifyOut-input" ${item.notifyOut?'checked':''}> Notify Stock Out
      </label>
      <label style="flex:1;display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;cursor:pointer">
        <input type="checkbox" id="notifyLow-input" ${item.notifyLow?'checked':''}> Notify Low Stock
      </label>
    </div>
    <button class="btn btn-primary" onclick="saveItem('${id}')">Save Changes</button>
    <button class="btn btn-danger btn-sm" onclick="deleteItem('${id}')" style="width:100%;margin-top:8px">Delete Item</button>
  `;openModal();
}
function adjQ(d){const inp=document.getElementById('qty-input');let v=parseFloat(inp.value)+d;if(v<0)v=0;inp.value=v;}
function saveItem(id){
  const item=state.inventory.find(i=>i.id===id);if(!item)return;
  const old=item.qty;item.qty=parseFloat(document.getElementById('qty-input').value)||0;
  item.par=parseFloat(document.getElementById('par-input').value)||item.par;
  item.sub=document.getElementById('sub-input').value||item.sub;
  item.loc=document.getElementById('loc-input').value;
  item.expDate=document.getElementById('exp-input').value||null;
  const sl=parseFloat(document.getElementById('shelf-input').value);
  if(sl>0){item.shelfLife=sl;if(!item.shelfLifeStart)item.shelfLifeStart=new Date().toISOString();}else{item.shelfLife=null;item.shelfLifeStart=null;}
  item.notifyOut=document.getElementById('notifyOut-input').checked;
  item.notifyLow=document.getElementById('notifyLow-input').checked;
  const by=document.getElementById('adj-staff').value;
  if(item.qty!==old)state.invHistory.push({item:item.name,from:old,to:item.qty,by:by||'—',at:new Date().toISOString(),unit:item.unit});
  saveToDB();closeModal();renderInventory();updateBadge();toast('Updated '+item.name);
}
function deleteItem(id){if(!confirm('Delete this item?'))return;state.inventory=state.inventory.filter(i=>i.id!==id);saveToDB();closeModal();renderInventory();toast('Deleted');}

function openAddItem(){
  document.getElementById('modal-body').innerHTML=`
    <div class="modal-title">Add Item</div>
    <div class="form-group"><label class="form-label">Name</label><input class="form-input" id="add-name" placeholder="Item name"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Location</label><select class="form-input" id="add-loc">${LOCATIONS.map(l=>`<option value="${l.id}">${l.icon} ${l.label}</option>`).join('')}</select></div>
      <div class="form-group"><label class="form-label">Sub-group</label><input class="form-input" id="add-sub" placeholder="Cheeses, Meats..."></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Quantity</label><input class="form-input" id="add-qty" type="number" value="0"></div>
      <div class="form-group"><label class="form-label">Unit</label><input class="form-input" id="add-unit" placeholder="bags, lbs..."></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Par Level</label><input class="form-input" id="add-par" type="number" value="3"></div>
      <div class="form-group"><label class="form-label">Shelf Life (days)</label><input class="form-input" id="add-shelf" type="number" placeholder="Optional"></div>
    </div>
    <div style="display:flex;gap:10px;margin:10px 0">
      <label style="flex:1;display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;cursor:pointer"><input type="checkbox" id="add-notifyOut" checked> Notify Stock Out</label>
      <label style="flex:1;display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;cursor:pointer"><input type="checkbox" id="add-notifyLow"> Notify Low Stock</label>
    </div>
    <button class="btn btn-primary" onclick="saveNewItem()">Add Item</button>
  `;openModal();
}
function saveNewItem(){const n=document.getElementById('add-name').value.trim();if(!n){toast('Enter a name');return;}const sl=parseFloat(document.getElementById('add-shelf').value);state.inventory.push({id:'c_'+Date.now(),name:n,loc:document.getElementById('add-loc').value,sub:document.getElementById('add-sub').value||'Other',qty:parseFloat(document.getElementById('add-qty').value)||0,unit:document.getElementById('add-unit').value||'pcs',par:parseFloat(document.getElementById('add-par').value)||3,notifyOut:document.getElementById('add-notifyOut').checked,notifyLow:document.getElementById('add-notifyLow').checked,shelfLife:sl>0?sl:null,shelfLifeStart:sl>0?new Date().toISOString():null,expDate:null});saveToDB();closeModal();renderInventory();updateBadge();toast('Added '+n);}

function openWasteLog(){document.getElementById('modal-body').innerHTML=`<div class="modal-title">Waste / Spoilage</div><div class="form-group"><label class="form-label">Item</label><select class="form-input" id="waste-item">${state.inventory.map(i=>`<option value="${i.id}">${i.name}</option>`).join('')}</select></div><div class="form-row"><div class="form-group"><label class="form-label">Qty</label><input class="form-input" id="waste-qty" type="number" value="1"></div><div class="form-group"><label class="form-label">Reason</label><select class="form-input" id="waste-reason"><option>Expired</option><option>Spoiled</option><option>Dropped</option><option>Over-prepped</option><option>Other</option></select></div></div><div class="form-group"><label class="form-label">By</label><select class="form-input" id="waste-by">${state.staff.map(s=>`<option value="${s.initials}">${s.name}</option>`).join('')}</select></div><button class="btn btn-primary" onclick="logWaste()" style="margin-bottom:16px">Log Waste</button><div style="font-weight:600;font-size:14px;margin-bottom:8px">Recent</div>${state.wasteLog.slice(-8).reverse().map(w=>`<div class="waste-entry"><div class="waste-item">${w.item} — ${w.qty} ${w.unit}</div><div class="waste-meta">${w.reason} · ${w.by} · ${new Date(w.at).toLocaleDateString()}</div></div>`).join('')||'<div class="empty-state"><p>No waste logged</p></div>'}`;openModal();}
function logWaste(){const id=document.getElementById('waste-item').value;const item=state.inventory.find(i=>i.id===id);if(!item)return;const q=parseFloat(document.getElementById('waste-qty').value)||0;state.wasteLog.push({item:item.name,itemId:id,qty:q,unit:item.unit,reason:document.getElementById('waste-reason').value,by:document.getElementById('waste-by').value,at:new Date().toISOString()});item.qty=Math.max(0,item.qty-q);saveToDB();toast('Waste logged');openWasteLog();}

// ─── NOTIFICATIONS ───
function renderNotify(){
  const n=getNotifications();
  const c=document.getElementById('notify-content');
  if(!n.length){c.innerHTML='<div class="empty-state"><p style="font-size:16px">✓ No alerts right now</p><p>Items with notifications enabled will appear here when stock is low, out, or nearing expiry.</p></div>';return;}
  const groups={};n.forEach(a=>{const k=a.type;if(!groups[k])groups[k]=[];groups[k].push(a);});
  const labels={out:'🔴 Out of Stock',critical:'🟡 Critical Low',low:'🟡 Running Low',expired:'⚫ Expired',expiring:'🟠 Expiring Soon'};
  const dotC={out:'gray',critical:'red',low:'yellow',expired:'gray',expiring:'orange'};
  let html='';
  Object.entries(labels).forEach(([type,label])=>{
    if(!groups[type])return;
    html+=`<div class="notify-section-title">${label} (${groups[type].length})</div>`;
    groups[type].forEach(a=>{
      html+=`<div class="notify-item" onclick="openItemDetail('${a.item.id}')"><div class="n-dot" style="background:var(--${dotC[type]})"></div><div class="n-info"><div class="n-name">${a.item.name}</div><div class="n-detail">${getLocIcon(a.item.loc)} ${getLocLabel(a.item.loc)} · ${a.msg}</div></div></div>`;
    });
  });
  c.innerHTML=html;
}

// ─── CHECKLIST ───
function renderChecklist(){
  document.getElementById('shift-tabs').innerHTML=Object.entries(CHECKLISTS).map(([k,cl])=>`<button class="shift-tab ${state.checklistShift===k?'active':''}" onclick="setShift('${k}')">${cl.label}</button>`).join('');
  const cl=CHECKLISTS[state.checklistShift];if(!cl)return;
  const d=today();if(!state.checklistLog[d])state.checklistLog[d]={};const log=state.checklistLog[d];
  const allT=getAllTasks(state.checklistShift);const dN=allT.filter(t=>log[t.id]?.done).length;const pct=allT.length?Math.round(dN/allT.length*100):0;
  document.getElementById('progress-text').textContent=`${dN} of ${allT.length} tasks`;
  document.getElementById('progress-pct').textContent=pct+'%';
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('check-list').innerHTML=cl.groups.map(g=>`<div class="task-group-title">${g.title}</div>${g.tasks.map(t=>{const e=log[t.id];const done=e?.done;const cr=t.critical;return`<div class="task-item ${done?'done':''} ${cr&&!done?'overdue':''}"><div class="task-check" onclick="${done?`uncompleteTask('${t.id}')`:`promptInitials('${t.id}')`}">${done?'✓':''}</div><div class="task-content"><div class="task-name">${t.name}${cr?' ⚠️':''}</div><div class="task-detail">${done?`✓ ${e.by} — ${e.at}`:(cr?'Critical':'Tap to complete')}</div></div></div>`;}).join('')}`).join('');
}
function setShift(s){state.checklistShift=s;renderChecklist();}
function resetTodayChecklist(){if(!confirm('Reset all tasks for today?'))return;state.checklistLog[today()]={};saveToDB();renderChecklist();toast('Reset');}

let pendingTaskId=null;
function promptInitials(tid){pendingTaskId=tid;document.getElementById('initials-prompt-container').innerHTML=`<div class="initials-prompt" onclick="if(event.target===this)cancelInitials()"><div class="initials-box"><h3>Who's completing this?</h3><div class="initials-grid">${state.staff.map(s=>`<button class="initials-btn" onclick="confirmTask('${s.initials}')">${s.initials}<br><span style="font-size:11px;font-weight:400;color:var(--text-secondary)">${s.name}</span></button>`).join('')}</div><button style="width:100%;margin-top:10px;padding:10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-hover);font-size:13px;font-weight:500" onclick="cancelInitials()">Cancel</button></div></div>`;}
function confirmTask(init){if(!pendingTaskId)return;const d=today();if(!state.checklistLog[d])state.checklistLog[d]={};state.checklistLog[d][pendingTaskId]={done:true,by:init,at:now()};pendingTaskId=null;document.getElementById('initials-prompt-container').innerHTML='';saveToDB();renderChecklist();}
function cancelInitials(){pendingTaskId=null;document.getElementById('initials-prompt-container').innerHTML='';}
function uncompleteTask(tid){const d=today();if(state.checklistLog[d]?.[tid]){delete state.checklistLog[d][tid];saveToDB();renderChecklist();}}

// ─── ANALYTICS ───
function renderAnalytics(){
  const c=document.getElementById('analytics-content');
  const st={green:0,yellow:0,red:0,gray:0};state.inventory.forEach(i=>st[getStatus(i)]++);
  const staffS={};state.staff.forEach(s=>staffS[s.initials]=0);Object.values(state.checklistLog).forEach(dl=>{Object.values(dl).forEach(e=>{if(e.done&&staffS[e.by]!==undefined)staffS[e.by]++;});});
  const maxS=Math.max(...Object.values(staffS),1);
  const totalDone=Object.values(state.checklistLog).reduce((s,dl)=>s+Object.values(dl).filter(e=>e.done).length,0);
  const locCounts={};LOCATIONS.forEach(l=>locCounts[l.label]=0);state.inventory.forEach(i=>{const lb=getLocLabel(i.loc);if(locCounts[lb]!==undefined)locCounts[lb]++;});
  const maxL=Math.max(...Object.values(locCounts),1);
  c.innerHTML=`
    <div class="quick-stats" style="margin-bottom:16px">
      <div class="stat-card info"><div class="stat-num">${state.inventory.length}</div><div class="stat-label">Items</div></div>
      <div class="stat-card good"><div class="stat-num">${st.green}</div><div class="stat-label">Healthy</div></div>
      <div class="stat-card warn"><div class="stat-num">${st.yellow+st.red}</div><div class="stat-label">Low/Critical</div></div>
      <div class="stat-card info"><div class="stat-num">${totalDone}</div><div class="stat-label">Tasks Done</div></div>
    </div>
    <div class="analytics-card"><h3>📦 Stock Status</h3><div class="bar-chart">
      <div class="bar-row"><span class="bar-label">Healthy</span><div class="bar-track"><div class="bar-fill" style="width:${st.green/state.inventory.length*100}%;background:var(--green)">${st.green}</div></div></div>
      <div class="bar-row"><span class="bar-label">Low</span><div class="bar-track"><div class="bar-fill" style="width:${st.yellow/state.inventory.length*100}%;background:var(--yellow)">${st.yellow}</div></div></div>
      <div class="bar-row"><span class="bar-label">Critical</span><div class="bar-track"><div class="bar-fill" style="width:${st.red/state.inventory.length*100}%;background:var(--red)">${st.red}</div></div></div>
      <div class="bar-row"><span class="bar-label">Out</span><div class="bar-track"><div class="bar-fill" style="width:${st.gray/state.inventory.length*100}%;background:var(--gray)">${st.gray}</div></div></div>
    </div></div>
    <div class="analytics-card"><h3>📍 Items by Location</h3><div class="bar-chart">${Object.entries(locCounts).map(([l,n])=>`<div class="bar-row"><span class="bar-label">${l.replace('Storage Freezer ','Stor.')}</span><div class="bar-track"><div class="bar-fill" style="width:${n/maxL*100}%">${n}</div></div></div>`).join('')}</div></div>
    <div class="analytics-card"><h3>👥 Tasks by Staff</h3><div class="bar-chart">${Object.entries(staffS).map(([i,n])=>`<div class="bar-row"><span class="bar-label">${i}</span><div class="bar-track"><div class="bar-fill" style="width:${n/maxS*100}%">${n}</div></div></div>`).join('')}</div></div>
    <div class="analytics-card"><h3>📊 Change History</h3>${state.invHistory.length===0?'<div class="empty-state"><p>No changes yet</p></div>':`<div style="max-height:300px;overflow-y:auto">${state.invHistory.slice(-20).reverse().map(h=>`<div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:13px"><strong>${h.item}</strong>: ${h.from} → ${h.to} ${h.unit}<div style="font-size:11px;color:var(--text-secondary)">by ${h.by} · ${new Date(h.at).toLocaleString()}</div></div>`).join('')}</div>`}</div>`;
}

// ─── SETTINGS ───
function renderSettings(){
  document.getElementById('dark-toggle').className='toggle'+(state.settings.darkMode?' on':'');
  document.getElementById('manager-toggle').className='toggle'+(state.settings.managerMode?' on':'');
  document.getElementById('staff-list').innerHTML=state.staff.map((s,i)=>`<div class="staff-chip">${s.name} (${s.initials}) <span class="remove" onclick="removeStaff(${i})">×</span></div>`).join('');
}
function addStaff(){const n=document.getElementById('new-staff-name').value.trim(),i=document.getElementById('new-staff-init').value.trim().toUpperCase();if(!n||!i){toast('Enter name and initials');return;}state.staff.push({name:n,initials:i});document.getElementById('new-staff-name').value='';document.getElementById('new-staff-init').value='';saveToDB();renderSettings();toast('Added '+n);}
function removeStaff(i){if(!confirm('Remove '+state.staff[i].name+'?'))return;state.staff.splice(i,1);saveToDB();renderSettings();}
function toggleTheme(){state.settings.darkMode=!state.settings.darkMode;document.documentElement.setAttribute('data-theme',state.settings.darkMode?'dark':'light');saveToDB();if(state.currentPage==='settings')renderSettings();}
function toggleManager(){state.settings.managerMode=!state.settings.managerMode;saveToDB();renderSettings();}
function openModal(){document.getElementById('modal').classList.add('show');}
function closeModal(){document.getElementById('modal').classList.remove('show');}
function exportData(){const d=JSON.stringify(state,null,2);const b=new Blob([d],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`pinos-ops-${today()}.json`;a.click();toast('Exported');}
function exportCSV(){const rows=[['Name','Location','Sub-group','Qty','Unit','Par','Notify Out','Notify Low']];state.inventory.forEach(i=>{rows.push([i.name,getLocLabel(i.loc),i.sub,i.qty,i.unit,i.par,i.notifyOut?'Yes':'No',i.notifyLow?'Yes':'No']);});const csv=rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');const b=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`pinos-inventory-${today()}.csv`;a.click();toast('CSV exported');}
function clearAllData(){if(!confirm('Erase ALL data?'))return;if(!confirm('Cannot be undone.'))return;state.inventory=DEFAULT_INVENTORY.map(i=>({...i}));state.checklistLog={};state.wasteLog=[];state.invHistory=[];saveToDB();goTo('dash');toast('Data cleared');}

async function init(){await openDB();await loadFromDB();if(state.inventory.length===0){state.inventory=DEFAULT_INVENTORY.map(i=>({...i}));saveToDB();}if(state.settings.darkMode)document.documentElement.setAttribute('data-theme','dark');goTo('dash');}
init();
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
