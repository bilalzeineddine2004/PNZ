function estFood(desc){
  const d=desc.toLowerCase().replace(/[,\.!?&]/g,' ').replace(/\s+/g,' ').trim();
  if(!d)return null;
  const keys=Object.keys(FDB).sort((a,b)=>b.length-a.length);
  let matched=[];let rem=d;
  for(const k of keys){const i=rem.indexOf(k);if(i!==-1){matched.push({k,f:FDB[k]});rem=rem.substring(0,i)+rem.substring(i+k.length);}}
  let m=1;const nm=d.match(/(\d+)\s/);if(nm&&+nm[1]>1&&+nm[1]<10)m=+nm[1];
  if(/large|big|extra/i.test(d))m*=1.4;if(/small|half/i.test(d))m*=0.6;if(/double|two|2x/i.test(d)&&m===1)m=2;
  if(!matched.length){if(/breakfast/i.test(d))return{name:"Breakfast",cal:500,p:25,c:55,f:18};if(/lunch/i.test(d))return{name:"Lunch",cal:600,p:35,c:60,f:20};if(/dinner/i.test(d))return{name:"Dinner",cal:700,p:40,c:65,f:25};return{name:desc,cal:400,p:20,c:45,f:15};}
  let t={cal:0,p:0,c:0,f:0};const names=[];
  matched.forEach(({k,f})=>{const sv=f.s/100*m;t.cal+=Math.round(f.c*sv);t.p+=Math.round(f.p*sv);t.c+=Math.round(f.cb*sv);t.f+=Math.round(f.f*sv);names.push(k.split(' ').map(w=>w[0].toUpperCase()+w.slice(1)).join(' '));});
  return{name:names.join(' + '),cal:t.cal,p:t.p,c:t.c,f:t.f};
}

"240" width="16" height="44" rx="7" fill={hc(ca)} stroke="#444" strokeWidth=".5"/><rect x="108" y="240" width="16" height="44" rx="7" fill={hc(ca)} stroke="#444" strokeWidth=".5"/><ellipse cx="84" cy="290" rx="10" ry="5" fill="#333"/><ellipse cx="116" cy="290" rx="10" ry="5" fill="#333"/><text x="100" y="335" textAnchor="middle" fill="#444" fontSize="8" fontFamily="'DM Sans'">Solid=front · Dashed=back</text></svg>;

function App(){
  const[tab,setTab]=useState("workout");
  const[curDate,setCurDate]=useState(today());

  const todayStr=today();const cDow=dow(parse(curDate));

  const dd=gDay(curDate);const hist=gHist();const tpls=gTpls()||DEF_TPLS;const suppList=gSupps()||DEF_SUPPS;const exW=gExW();const habits=gHabits();

  const save=(patch)=>{const prev=gDay(curDate);const next={...prev,...patch};pDay(curDate,next);
    const h=gHist();const t=next.templateId?(gTpls()||DEF_TPLS).find(x=>x.id===next.templateId):null;const mh={};
    if(t){t.exercises.forEach((ex,ei)=>{if(Array.from({length:ex.sets},(_,si)=>next.sets[`${ei}-${si}`]).some(Boolean)){(ex.primary||[]).forEach(m=>{mh[m]=(mh[m]||0)+2;});(ex.secondary||[]).forEach(m=>{mh[m]=(mh[m]||0)+1;});}});}
    const ms=next.meals||[];h[curDate]={p:ms.reduce((a,m)=>a+(m.p||0),0),cal:ms.reduce((a,m)=>a+(m.cal||0),0),c:ms.reduce((a,m)=>a+(m.c||0),0),f:ms.reduce((a,m)=>a+(m.f||0),0),water:next.water,sleep:next.sleep,bw:next.bw,muscles:mh,dayType:t?.type||"rest",setsD:Object.values(next.sets).filter(Boolean).length,setsT:t?t.exercises.reduce((a,e)=>a+e.sets,0):0,habitsD:Object.values(next.habits||{}).filter(Boolean).length,habitsT:habits.length};
    pHist(h);rr();
  };
  const saveTpls=t=>{pTpls(t);rr();};
  const saveSL=s=>{pSupps(s);rr();};
  const saveExW=(name,wt)=>{const e=gExW();e[name.toLowerCase()]=wt;pExW(e);};
  const saveHabits=h=>{pHabits(h);rr();};

  const[timer,setTimer]=useState(0);const[timerOn,setTimerOn]=useState(false);const timerEnd=useRef(0);
  useEffect(()=>{if(!timerOn)return;const id=setInterval(()=>{const left=Math.max(0,Math.ceil((timerEnd.current-Date.now())/1000));setTimer(left);if(left<=0){setTimerOn(false);clearInterval(id);}},250);return()=>clearInterval(id);},[timerOn]);
  const startTimer=()=>{timerEnd.current=Date.now()+90000;setTimer(90);setTimerOn(true);};

  return (
    <div style={{fontFamily:"'DM Sans',sans-serif",background:C.bg,color:C.txt,minHeight:"100vh",maxWidth:480,margin:"0 auto",paddingBottom:80}}>

      <div style={{padding:"16px 20px 0",background:"linear-gradient(180deg,#1a1610,#0C0C0C)"}}>

          <div style={{fontSize:11,color:C.sub}}>{parse(curDate).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}</div>
        </div>
        <div style={{fontFamily:"'Oswald'",fontSize:40,fontWeight:700,lineHeight:1}}>{curDate===todayStr?"TODAY":dayN[cDow].toUpperCase()}</div>
        <div style={{fontFamily:"'Oswald'",fontSize:40,fontWeight:700,lineHeight:1,color:tpl?.color||C.gold}}>{tpl?.name||"No Session Set"}</div>

        {/* Date Nav */}
        <div style={{display:"flex",alignItems:"center",gap:6,marginTop:12,paddingBottom:12}}>
          <button onClick={()=>setCurDate(fmt(addD(parse(curDate),-1)))} style={{background:"none",border:"1px solid #333",borderRadius:8,padding:"6px 10px",color:C.sub,fontSize:16,cursor:"pointer"}}>‹</button>
          <div style={{flex:1,display:"flex",gap:3}}>{[0,1,2,3,4,5,6].map(i=>{
            const td=fmt(addD(parse(curDate),i-cDow));const sel=td===curDate;const isT=td===todayStr;const dayDD=gDay(td);const dayTpl=dayDD.templateId?(gTpls()||DEF_TPLS).find(x=>x.id===dayDD.templateId):null;
            return <button key={i} onClick={()=>setCurDate(td)} style={{flex:1,padding:"5px 0",borderRadius:6,border:`1px solid ${sel?dayTpl?.color||C.gold:"#1a1a1a"}`,background:sel?(dayTpl?.color||C.gold)+"33":"transparent",color:sel?dayTpl?.color||C.gold:C.mut,fontSize:10,fontWeight:700,cursor:"pointer",position:"relative",fontFamily:"'DM Sans'"}}>{shortD[i]}{isT&&<div style={{width:4,height:4,borderRadius:"50%",background:C.gold,position:"absolute",top:1,right:"calc(50% - 2px)"}}/>}{dayTpl&&<div style={{width:"100%",height:2,background:dayTpl.color,borderRadius:1,marginTop:2}}/>}</button>;
          })}</div>
          <button onClick={()=>setCurDate(fmt(addD(parse(curDate),1)))} style={{background:"none",border:"1px solid #333",borderRadius:8,padding:"6px 10px",color:C.sub,fontSize:16,cursor:"pointer"}}>›</button>
          {curDate!==todayStr&&<button onClick={()=>setCurDate(todayStr)} style={{background:C.gold,border:"none",borderRadius:8,padding:"6px 8px",color:"#000",fontSize:10,fontWeight:700,cursor:"pointer"}}>Now</button>}

        {tab==="workout"&&<WTab {...{dd,save,tpl,tpls,saveTpls,exs,totalS,doneS,exW,saveExW,timer,timerOn,startTimer,setTimerOn,setTimer,flash,curDate}}/>}
        {tab==="nutrition"&&<NTab {...{dd,save,tots,mac,tpl,flash}}/>}
        {tab==="tracker"&&<TTab {...{hist,exW,habits}}/>}
        {tab==="vitals"&&<VTab {...{dd,save,suppList,saveSL,curDate,flash,habits,saveHabits}}/>}

        {[{id:"workout",l:"Workout",e:"◎"},{id:"nutrition",l:"Nutrition",e:"◈"},{id:"tracker",l:"Tracker",e:"◉"},{id:"vitals",l:"Vitals",e:"♡"}].map(t=> <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",color:tab===t.id?C.gold:C.mut,display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"6px 0",cursor:"pointer",fontFamily:"'DM Sans'"}}><span style={{fontSize:20}}>{t.e}</span><span style={{fontSize:10,fontWeight:700}}>{t.l}</span></button>)}
      </div>
    </div>
  );
}

/* ══════ WORKOUT TAB ══════ */
function WTab({dd,save,tpl,tpls,saveTpls,exs,totalS,doneS,exW,saveExW,timer,timerOn,startTimer,setTimerOn,setTimer,flash,curDate}){
  const[exp,setExp]=useState(null);const[adding,setAdding]=useState(false);const[addN,setAddN]=useState("");const[editing,setEditing]=useState(null);const[ef,setEf]=useState({});const[showTplPicker,setShowTplPicker]=useState(false);const[showTplEditor,setShowTplEditor]=useState(false);const[editTplId,setEditTplId]=useState(null);const[newTplName,setNewTplName]=useState("");

  // Assign template to day
  const assignTpl=(id)=>{save({templateId:id,sets:{},wts:{}});setShowTplPicker(false);flash("Session set!");};
  const clearTpl=()=>{save({templateId:null,sets:{},wts:{}});flash("Cleared");};

  // Exercise ops on template
  const addExToTpl=()=>{if(!addN.trim()||!tpl)return;const det=detectEx(addN);const updated=tpls.map(t=>t.id===tpl.id?{...t,exercises:[...t.exercises,{id:uid(),...det}]}:t);saveTpls(updated);setAddN("");setAdding(false);flash("Added!");};
  const rmExFromTpl=(ei)=>{const updated=tpls.map(t=>t.id===tpl.id?{...t,exercises:t.exercises.filter((_,i)=>i!==ei)}:t);saveTpls(updated);};
  const mvEx=(ei,dir)=>{const exs=[...tpl.exercises];const ni=ei+dir;if(ni<0||ni>=exs.length)return;[exs[ei],exs[ni]]=[exs[ni],exs[ei]];saveTpls(tpls.map(t=>t.id===tpl.id?{...t,exercises:exs}:t));};
  const svEdit=(ei)=>{const exs=[...tpl.exercises];exs[ei]={...exs[ei],sets:+ef.sets||exs[ei].sets,reps:ef.reps||exs[ei].reps,note:ef.note??exs[ei].note};saveTpls(tpls.map(t=>t.id===tpl.id?{...t,exercises:exs}:t));setEditing(null);flash("Updated!");};
  const toggleSet=(key,exName,wt)=>{const ns={...dd.sets,[key]:!dd.sets[key]};save({sets:ns});if(!dd.sets[key]){startTimer();if(wt)saveExW(exName,wt);flash("Set logged!");}};
  const setWt=(key,val)=>save({wts:{...dd.wts,[key]:val}});

  // Create new template
  const createTpl=()=>{if(!newTplName.trim())return;const nt={id:uid(),name:newTplName,color:["#D4A843","#22C55E","#3B82F6","#A855F7","#EF4444","#F59E0B"][Math.floor(Math.random()*6)],type:"gym",exercises:[]};saveTpls([...tpls,nt]);setNewTplName("");flash("Template created!");};
  const deleteTpl=(id)=>{saveTpls(tpls.filter(t=>t.id!==id));flash("Deleted");};

  // No template assigned
  if(!tpl)return (
    <div className="fi" style={{paddingTop:8}}>
      <Card>
        <Lbl>Select Today's Session</Lbl>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {tpls.map(t=> <button key={t.id} onClick={()=>assignTpl(t.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",borderRadius:10,background:"#111",border:`1px solid ${t.color}33`,cursor:"pointer",textAlign:"left"}}>
            <div style={{width:8,height:30,borderRadius:4,background:t.color}}/>
            <div><div style={{fontSize:14,fontWeight:700,color:C.txt}}>{t.name}</div><div style={{fontSize:11,color:C.sub}}>{t.exercises?.length||0} exercises · {t.type}</div></div>
          </button>)}
        </div>
      </Card>
      <Card>
        <Lbl>Create New Template</Lbl>
        <div style={{display:"flex",gap:8}}><input placeholder="Template name..." value={newTplName} onChange={e=>setNewTplName(e.target.value)} style={{...inp,flex:1}}/><Btn gold onClick={createTpl}>Create</Btn></div>
      </Card>
      <Card>
        <Lbl>Manage Templates</Lbl>
        {tpls.map(t=> <div key={t.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid #1a1a1a"}}>
          <span style={{fontSize:13,fontWeight:600,color:t.color}}>{t.name}</span>
          <div style={{display:"flex",gap:4}}>
            <Btn small onClick={()=>{assignTpl(t.id);}}>Use</Btn>
            <RemoveBtn label="✕" onConfirm={()=>deleteTpl(t.id)} style={{padding:"4px 8px",borderRadius:6,background:"none",border:`1px solid ${C.red}33`,color:C.red,fontSize:11,cursor:"pointer",fontFamily:"'DM Sans'"}}/>
          </div>
        </div>)}
      </Card>
      <div style={{height:16}}/>
    </div>
  );

  return (
    <div className="fi">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4,marginBottom:8}}>
        <div><div style={{fontSize:12,fontWeight:600,color:C.sub,textTransform:"uppercase",letterSpacing:1}}>Sets</div><div style={{display:"flex",alignItems:"baseline",gap:4,marginTop:2}}><span style={{fontFamily:"'Oswald'",fontSize:28,fontWeight:700,color:doneS===totalS&&totalS>0?C.grn:C.txt}}>{doneS}</span><span style={{fontSize:14,color:C.mut}}>/ {totalS}</span></div></div>

/* ══════ TRACKER TAB ══════ */
function TTab({hist,exW,habits}){
  const streak=(()=>{let s=0;const d=new Date();d.setDate(d.getDate()-1);while(hist[fmt(d)]){s++;d.setDate(d.getDate()-1);}return s;})();
  const l14=[];for(let i=13;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);l14.push({date:fmt(d).slice(5),dn:shortD[d.getDay()],data:hist[fmt(d)]||null});}
  const wm={};for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()-i);const h=hist[fmt(d)];if(h?.muscles)Object.entries(h.muscles).forEach(([m,v])=>{wm[m]=(wm[m]||0)+v;});}
  const mx=Math.max(1,...Object.values(wm));const getHC=v=>{if(!v)return"#1a1a1a";const p=v/mx;return p>.7?C.grn:p>.4?C.gold:"#D4A84366";};
  const upper=["Chest","Front Delts","Side Delts","Rear Delts","Triceps","Biceps","Upper Back","Lats"].reduce((a,m)=>a+(wm[m]||0),0);
  const lower=["Quads","Hamstrings","Glutes","Calves","Hip Flexors"].reduce((a,m)=>a+(wm[m]||0),0);const core=wm["Core"]||0;
  const pD=l14.filter(d=>d.data?.p).map(d=>({l:d.date,v:d.data.p}));const cD=l14.filter(d=>d.data?.cal).map(d=>({l:d.date,v:d.data.cal}));
  const wD=Object.entries(hist).filter(([_,v])=>v.bw).sort(([a],[b])=>a.localeCompare(b)).slice(-14).map(([d,v])=>({l:d.slice(5),v:+v.bw}));
  const wDays=l14.filter(d=>d.data?.setsT>0);const cDays=wDays.filter(d=>d.data.setsD===d.data.setsT).length;
  const exWE=Object.entries(exW).filter(([_,v])=>v).sort(([a],[b])=>a.localeCompare(b));
  // Habit streak
  const habDays=l14.filter(d=>d.data&&d.data.habitsD>0&&d.data.habitsD===d.data.habitsT).length;

  return (
    <div className="fi" style={{display:"flex",flexDirection:"column",gap:12,paddingTop:8}}>
      <div style={{fontFamily:"'Oswald'",fontSize:28,fontWeight:700}}>TRACKER</div>
      <div style={{fontSize:12,color:C.gold,fontWeight:600,textTransform:"uppercase",letterSpacing:1,marginTop:-8}}>{streak>0?`${streak} day streak`:"Day 1"} · {dLeft()}d left</div>
      <div style={{display:"flex",gap:8}}>{[{n:streak,l:"Streak"},{n:`${cDays}/${wDays.length}`,l:"Workouts"},{n:habDays,l:"Habits✓"}].map((s,i)=> <div key={i} style={{flex:1,background:C.card,borderRadius:12,padding:"12px 10px",textAlign:"center",border:`1px solid ${C.cb}`}}><div style={{fontFamily:"'Oswald'",fontSize:22,fontWeight:700,color:C.gold}}>{s.n}</div><div style={{fontSize:10,color:C.sub,textTransform:"uppercase",marginTop:2}}>{s.l}</div></div>)}</div>

      <Card><Lbl>Muscle Heatmap</Lbl><BodyMap muscles={wm}/></Card>
      <Card><Lbl>Volume Split</Lbl><div style={{display:"flex",gap:8,marginBottom:12}}>{[{l:"Upper",v:upper,c:C.blu},{l:"Lower",v:lower,c:C.grn},{l:"Core",v:core,c:C.gold}].map((g,i)=> <div key={i} style={{flex:1,textAlign:"center",padding:"10px 0",background:g.c+"15",borderRadius:10,border:`1px solid ${g.c}33`}}><div style={{fontFamily:"'Oswald'",fontSize:20,fontWeight:700,color:g.c}}>{g.v}</div><div style={{fontSize:10,color:C.sub,textTransform:"uppercase"}}>{g.l}</div></div>)}</div><div style={{display:"flex",flexWrap:"wrap",gap:5}}>{MS.map(m=>{const v=wm[m]||0;const col=getHC(v);return <div key={m} style={{padding:"5px 8px",borderRadius:7,background:col+"22",border:`1px solid ${col}55`,fontSize:10,fontWeight:600,color:v?col:C.mut}}>{m}{v>0&&` ·${v}`}</div>;})}</div></Card>
      <Card><Lbl>14-Day Activity</Lbl><div style={{display:"flex",gap:3}}>{l14.map((d,i)=>{const w=d.data?.setsT>0;const ok=w&&d.data.setsD===d.data.setsT;return <div key={i} style={{flex:1,textAlign:"center"}}><div style={{fontSize:8,color:C.mut,marginBottom:2}}>{d.dn}</div><div style={{height:24,borderRadius:4,background:ok?C.grn:w?"#D4A84366":d.data?"#ffffff10":"#111",display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:700,color:ok?"#000":C.mut}}>{ok?"✓":w?"½":""}</div><div style={{fontSize:7,color:C.mut,marginTop:1}}>{d.date}</div></div>;})}</div></Card>
      {exWE.length>0&&<Card><Lbl>Progressive Overload</Lbl>{exWE.map(([n,w])=> <div key={n} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid #1a1a1a"}}><span style={{fontSize:12,fontWeight:600,textTransform:"capitalize"}}>{n}</span><span style={{fontFamily:"'Oswald'",fontSize:15,fontWeight:700,color:C.gold}}>{w} lbs</span></div>)}</Card>}
      {pD.length>1&&<Card><Lbl>Protein</Lbl><MC data={pD} target={155} color={C.grn} unit="g"/></Card>}
      {cD.length>1&&<Card><Lbl>Calories</Lbl><MC data={cD} target={2500} color={C.gold} unit=""/></Card>}
      {wD.length>1&&<Card><Lbl>Weight</Lbl><MC data={wD} color={C.blu} unit="lbs"/></Card>}
      <Card><Lbl>Weekly Avg</Lbl>{(()=>{const d7=[];for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()-i);const h=hist[fmt(d)];if(h)d7.push(h);}if(!d7.length)return <div style={{fontSize:13,color:C.mut}}>Log a few days.</div>;const av=(a,k)=>Math.round(a.reduce((s,d)=>s+(d[k]||0),0)/a.length);return <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{[{l:"Cal",v:av(d7,"cal"),c:C.gold},{l:"Protein",v:av(d7,"p")+"g",c:C.grn},{l:"Water",v:(av(d7,"water")*.25).toFixed(1)+"L",c:C.blu},{l:"Sleep",v:av(d7,"sleep")+"h",c:C.pur}].map((s,i)=> <div key={i} style={{flex:1,minWidth:"45%",padding:"10px",background:"#111",borderRadius:10,border:"1px solid #1a1a1a"}}><div style={{fontSize:11,color:C.sub}}>{s.l}</div><div style={{fontFamily:"'Oswald'",fontSize:18,fontWeight:700,color:s.c}}>{s.v}</div></div>)}</div>;})()}</Card>
      <div style={{height:12}}/>
    </div>
  );
}
function MC({data,target,color,unit}){if(data.length<2)return null;const vals=data.map(d=>d.v);const mn=Math.min(...vals,target||Infinity)-5;const mx=Math.max(...vals,target||0)+5;const rng=mx-mn||1;const w=Math.max(260,data.length*36);const h=80;const pts=data.map((d,i)=>({x:16+(i/(data.length-1))*(w-32),y:h-10-((d.v-mn)/rng)*(h-25)}));const ln=pts.map((p,i)=>`${i?"L":"M"} ${p.x} ${p.y}`).join(" ");const tY=target?h-10-((target-mn)/rng)*(h-25):null;return <div style={{overflowX:"auto"}}><svg width={w} height={h} viewBox={`0 0 ${w} ${h}`}>{tY!=null&&<><line x1={10} y1={tY} x2={w-10} y2={tY} stroke={color} strokeWidth="1" strokeDasharray="4,4" opacity=".3"/></>}<path d={ln} fill="none" stroke={color} strokeWidth="2"/>{pts.map((p,i)=> <g key={i}><circle cx={p.x} cy={p.y} r="3" fill={color}/><text x={p.x} y={p.y-8} textAnchor="middle" fill={C.sub} fontSize="8">{vals[i]}</text><text x={p.x} y={h-1} textAnchor="middle" fill={C.mut} fontSize="7">{data[i].l}</text></g>)}</svg></div>;}

/* ══════ VITALS TAB — with habits ══════ */
function VTab({dd,save,suppList,saveSL,curDate,flash,habits,saveHabits}){
  const[sl,setSl]=useState(dd.sleep);const[bwI,setBwI]=useState(dd.bw);
  const[addS,setAddS]=useState(false);const[sf,setSf]=useState({n:"",d:"",w:""});
  const[addH,setAddH]=useState(false);const[hName,setHName]=useState("");
  useEffect(()=>{setSl(dd.sleep);setBwI(dd.bw);},[curDate,dd.sleep,dd.bw]);

  const toggleHabit=(id)=>{save({habits:{...dd.habits,[id]:!dd.habits[id]}});flash("Tracked!");};

  return (
    <div className="fi" style={{display:"flex",flexDirection:"column",gap:12,paddingTop:8}}>
      <div style={{fontFamily:"'Oswald'",fontSize:28,fontWeight:700}}>VITALS</div>

      {/* Habits */}
      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><Lbl>Daily Habits</Lbl><Btn gold small onClick={()=>setAddH(!addH)}>+ Add</Btn></div>
        {addH&&<div style={{display:"flex",gap:8,marginBottom:10}}><input placeholder="Habit name... e.g. Read 20min" value={hName} onChange={e=>setHName(e.target.value)} style={{...sinp,flex:1}}/><Btn green onClick={()=>{if(!hName.trim())return;saveHabits([...habits,{id:uid(),name:hName}]);setHName("");setAddH(false);flash("Habit added!");}}>Add</Btn></div>}
        {habits.length===0&&!addH&&<div style={{fontSize:12,color:C.mut}}>No habits yet — add some to track daily.</div>}
        {habits.map(h=> <div key={h.id} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 0",borderBottom:"1px solid #1a1a1a"}}>
          <button onClick={()=>toggleHabit(h.id)} style={{width:28,height:28,borderRadius:8,border:`2px solid ${dd.habits[h.id]?C.grn:"#333"}`,background:dd.habits[h.id]?C.grn:"transparent",color:dd.habits[h.id]?"#000":C.txt,fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{dd.habits[h.id]?"✓":""}</button>
          <span style={{flex:1,fontSize:13,fontWeight:600}}>{h.name}</span>
          <RemoveBtn label="✕" onConfirm={()=>{saveHabits(habits.filter(x=>x.id!==h.id));flash("Removed");}} style={{background:"none",border:"none",color:C.mut,fontSize:12,cursor:"pointer",padding:"4px 8px",fontFamily:"'DM Sans'"}}/>
        </div>)}
      </Card>

      <Card><Lbl>Water · {(dd.water*.25).toFixed(1)}L / 3L</Lbl>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center"}}>{Array.from({length:12},(_,i)=> <button key={i} onClick={()=>{save({water:i<dd.water?i:i+1});flash(`${((i<dd.water?i:i+1)*.25).toFixed(1)}L`);}} style={{width:44,height:44,borderRadius:10,border:`1px solid ${i<dd.water?"#3B82F644":"#222"}`,background:i<dd.water?"#3B82F622":"#111",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,cursor:"pointer",opacity:i<dd.water?1:.3}}>💧</button>)}</div>
      </Card>

      <Card><Lbl>Sleep</Lbl><div style={{display:"flex",alignItems:"center",gap:12}}><input type="range" min="0" max="12" step="0.5" value={sl} onChange={e=>setSl(+e.target.value)}/><div style={{fontFamily:"'Oswald'",fontSize:24,fontWeight:700,color:sl>=7?C.grn:C.gold,minWidth:50,textAlign:"center"}}>{sl}h</div><Btn gold small onClick={()=>{save({sleep:sl});flash(`${sl}h logged`);}}>Log</Btn></div></Card>

      <Card><Lbl>Body Weight</Lbl><div style={{display:"flex",alignItems:"center",gap:8}}><input type="number" inputMode="decimal" placeholder="148" value={bwI} onChange={e=>setBwI(e.target.value)} style={{background:"#111",border:"1px solid #2a2a2a",borderRadius:8,padding:"8px 12px",color:C.txt,fontSize:20,fontWeight:700,width:90,textAlign:"center",outline:"none",fontFamily:"'Oswald'"}}/><span style={{color:C.sub}}>lbs</span><Btn gold onClick={()=>{save({bw:bwI});flash(`${bwI} lbs logged`);}}>Log</Btn></div></Card>

      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><Lbl>Supplements</Lbl><Btn gold small onClick={()=>setAddS(!addS)}>+ Add</Btn></div>
        {addS&&<div style={{display:"flex",flexDirection:"column",gap:6,padding:10,background:"#111",borderRadius:8,marginBottom:10}}>
          <input placeholder="Name" value={sf.n} onChange={e=>setSf({...sf,n:e.target.value})} style={sinp}/>
          <div style={{display:"flex",gap:6}}><input placeholder="Dose" value={sf.d} onChange={e=>setSf({...sf,d:e.target.value})} style={{...sinp,flex:1}}/><input placeholder="When" value={sf.w} onChange={e=>setSf({...sf,w:e.target.value})} style={{...sinp,flex:1}}/></div>
          <div style={{display:"flex",gap:6}}><Btn green onClick={()=>{if(!sf.n)return;saveSL([...suppList,{id:uid(),name:sf.n,dose:sf.d,when:sf.w}]);setSf({n:"",d:"",w:""});setAddS(false);flash("Added!");}}>Save</Btn><Btn onClick={()=>setAddS(false)}>Cancel</Btn></div>
        </div>}
        {suppList.map(s=> <div key={s.id} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 0",borderBottom:"1px solid #1a1a1a"}}>
          <button onClick={()=>{save({supps:{...dd.supps,[s.id]:!dd.supps[s.id]}});flash(dd.supps[s.id]?"Unchecked":"Taken!");}} style={{width:28,height:28,borderRadius:8,border:`2px solid ${dd.supps[s.id]?C.grn:"#333"}`,background:dd.supps[s.id]?C.grn:"transparent",color:dd.supps[s.id]?"#000":C.txt,fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{dd.supps[s.id]?"✓":""}</button>
          <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{s.name}</div><div style={{fontSize:11,color:C.sub}}>{s.dose}{s.when?` · ${s.when}`:""}</div></div>
          <RemoveBtn label="✕" onConfirm={()=>{saveSL(suppList.filter(x=>x.id!==s.id));flash("Removed");}} style={{background:"none",border:"none",color:C.mut,fontSize:12,cursor:"pointer",padding:"4px 8px",fontFamily:"'DM Sans'"}}/>
        </div>)}
      </Card>

      <Card><Lbl>Checklist</Lbl>{[{l:"Protein 155g+",d:dd.meals.reduce((a,m)=>a+(m.p||0),0)>=155},{l:"Water 3L+",d:dd.water>=12},{l:"Creatine",d:!!dd.supps.creatine},{l:"7+ hrs sleep",d:dd.sleep>=7},{l:"Weight logged",d:!!dd.bw},{l:`Habits ${Object.values(dd.habits||{}).filter(Boolean).length}/${habits.length}`,d:habits.length>0&&Object.values(dd.habits||{}).filter(Boolean).length===habits.length}].map((c,i)=> <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"4px 0",opacity:c.d?1:.4}}><span style={{color:c.d?C.grn:C.mut,fontWeight:700}}>{c.d?"✓":"○"}</span><span style={{fontSize:13}}>{c.l}</span></div>)}</Card>
      <div style={{height:12}}/>
    </div>
  );
}

ReactDOM.render(React.createElement(App),document.getElementById('root'));
</script>
</body>
</html>
